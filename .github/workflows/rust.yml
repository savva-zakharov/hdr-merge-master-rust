name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Ubuntu build
  ubuntu:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          llvm-dev \
          libclang-dev \
          clang \
          libopencv-dev \
          libgtk-3-dev \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxkbcommon-dev \
          libssl-dev \
          pkg-config \
          libssl-dev
    
    - name: Build
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Build release
      run: cargo build --release --verbose

  # Fedora build
  fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        dnf -y update
        dnf -y install \
          llvm-devel \
          clang-devel \
          clang \
          opencv-devel \
          gtk3-devel \
          libxcb-devel \
          libxkbcommon-devel \
          openssl-devel \
          pkg-config \
          gcc \
          cargo \
          make
    
    - name: Build
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Build release
      run: cargo build --release --verbose

  # Windows build
  windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install LLVM
      run: |
        choco install llvm -y
        echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Install OpenCV
      run: |
        choco install opencv -y
        # OpenCV is typically installed to C:\tools\opencv
        echo "OPENCV_DIR=C:\tools\opencv\build" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "C:\tools\opencv\build\x64\vc16\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Install clang
      run: choco install llvm -y
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Build
      run: cargo build --verbose
      env:
        LLVM_CONFIG_PATH: 'C:\Program Files\LLVM\bin\llvm-config.exe'
    
    - name: Run tests
      run: cargo test --verbose
      env:
        LLVM_CONFIG_PATH: 'C:\Program Files\LLVM\bin\llvm-config.exe'
    
    - name: Build release
      run: cargo build --release --verbose
      env:
        LLVM_CONFIG_PATH: 'C:\Program Files\LLVM\bin\llvm-config.exe'
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hdr-merge-master-windows
        path: target/release/hdr-merge-master.exe
        retention-days: 7
